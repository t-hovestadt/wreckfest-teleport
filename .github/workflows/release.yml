name: release

# Build on Windows and publish a release whenever a version tag (vX.Y.Z) is
# pushed. GitHub's runners do the build; nothing is built locally.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/wreckfest-teleport | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/wreckfest-teleport.exe dist/wreckfest-teleport/
          Copy-Item scripts/*.bat dist/wreckfest-teleport/
          Copy-Item README.md dist/wreckfest-teleport/
          Compress-Archive -Path dist/wreckfest-teleport/* -DestinationPath dist/wreckfest-teleport-${{ github.ref_name }}-windows.zip
          Copy-Item target/x86_64-pc-windows-msvc/release/wreckfest-teleport.exe dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wreckfest-teleport-${{ github.ref_name }}-windows.zip
            dist/wreckfest-teleport.exe
            scripts/*.bat
          generate_release_notes: true
